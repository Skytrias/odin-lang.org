<header class="sticky top-0 z-50">
    <nav class="odin-nav justify-between gap-4">
        <!-- Brand -->
        <a class="odin-nav-brand shrink-0" href="/">
            {{ if .IsHome }}
                <img src="/logo.svg" height="28" alt="Odin" id="navbar-logo" class="hidden" />
            {{ else }}
                <img src="/logo.svg" height="28" alt="Odin" id="navbar-logo" />
            {{ end }}
        </a>

        <!-- Mobile hamburger -->
        <button
            id="nav-toggle"
            class="lg:hidden p-2 rounded text-white/70 hover:text-white hover:bg-white/10 transition-colors"
            aria-controls="nav-menu"
            aria-expanded="false"
            aria-label="Toggle navigation"
        >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
        </button>

        <!-- Nav links -->
        <div id="nav-menu"
             class="hidden lg:flex flex-col lg:flex-row items-start lg:items-center gap-1
                    absolute lg:static top-[60px] left-0 right-0
                    lg:bg-transparent
                    px-4 lg:px-0 py-3 lg:py-0
                    border-b border-white/5 lg:border-0
                    z-40">
            {{ $currentPage := . }}
            {{ range .Site.Menus.main }}
                {{ $active := or (eq $currentPage.RelPermalink .URL) (and (in $currentPage.RelPermalink .URL) (ne .URL "/")) }}
                <a
                    class="odin-nav-link w-full lg:w-auto{{if $active}} active{{end}}"
                    href="{{.URL}}"
                    {{if $active}}aria-current="page"{{end}}
                    {{if in .URL "github.com"}}target="_blank"{{end}}
                >{{.Name}}</a>
            {{ end }}
        </div>
    </nav>
</header>
